decisions_ref: docs/project_decisions.md

# Stage B: dance-domain continuation. Mix retains some COCO+CrowdPose to avoid
# catastrophic forgetting of generic anatomy.

stage: B_dance
data_config: configs/data/pose_train.yaml
model_config: configs/model/hrnet_w32.yaml
output_dir: data/processed/stage_B

dataset_mix:
  aistpp: 0.6
  coco: 0.2
  crowdpose: 0.2

epochs: 45
batch_size: 64
num_workers: 6
optimizer:
  name: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
scheduler:
  name: cosine
  warmup_epochs: 2
  min_lr: 1.0e-6

loss:
  name: joint_mse_with_visibility
  use_target_weight: true

eval_every_n_epochs: 1
save_every_n_epochs: 3
log_every_n_steps: 50

# Continue from Stage A checkpoint. Only our own weights; still no external
# pretrained models (see docs/project_decisions.md).
init_from: data/processed/stage_A/best.pt
