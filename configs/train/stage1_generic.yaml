decisions_ref: docs/project_decisions.md

# Stage A: generic human pose from scratch.
# Mix: 70% COCO, 30% CrowdPose.

stage: A_generic
data_config: configs/data/pose_train.yaml
model_config: configs/model/simple_baseline.yaml   # switch to hrnet_w32.yaml for the final run
output_dir: data/processed/stage_A

dataset_mix:
  coco: 0.7
  crowdpose: 0.3
  aistpp: 0.0

epochs: 150
batch_size: 64
num_workers: 6
optimizer:
  name: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-4
scheduler:
  name: cosine
  warmup_epochs: 5
  min_lr: 1.0e-6

loss:
  name: joint_mse_with_visibility
  use_target_weight: true

eval_every_n_epochs: 2
save_every_n_epochs: 5
log_every_n_steps: 50

resume_from: null
init_from: null                 # random init, no pretrained weights
