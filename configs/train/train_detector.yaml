decisions_ref: docs/project_decisions.md

# Detector training stage. Runs independently of pose training; both are
# initialized randomly and trained from scratch on AIST++ labels paired
# with data/raw_videos/ (docs/project_decisions.md sections 1 and 6).

stage: detector
data_config:  configs/data/detector_train.yaml
model_config: configs/model/person_detector.yaml
output_dir:   data/processed/detector

input_size: [256, 256]         # [H, W]  -- square input, simple resize
output_stride: 4               # matches PersonDetector.output_stride

epochs: 20
batch_size: 32
num_workers: 4

optimizer:
  name: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-4

scheduler:
  name: cosine
  warmup_epochs: 2
  min_lr: 1.0e-6

loss:
  center_weight: 1.0
  size_weight: 0.1

eval_every_n_epochs: 2
save_every_n_epochs: 5
log_every_n_steps: 50

resume_from: null
init_from: null                # random init; NEVER external weights
