decisions_ref: docs/project_decisions.md

# Stage C (OPTIONAL): self-training on high-confidence pseudo-labels from
# unlabeled AIST or own benchmark/imitation videos. Use conservatively.

stage: C_selftrain
data_config: configs/data/pose_train.yaml
model_config: configs/model/hrnet_w32.yaml
output_dir: data/processed/stage_C

# Inputs for pseudo-label generation:
pseudo_label:
  teacher_ckpt: data/processed/stage_B/best.pt
  unlabeled_video_manifest: data/manifests/benchmark_candidate_manifest.parquet
  confidence_threshold: 0.75
  per_joint_confidence_threshold: 0.5
  min_visible_joints: 12
  frame_stride: 10
  out_annotations: data/labels/aist_pseudo/internal_train.jsonl

dataset_mix:
  aistpp: 0.5
  aist_pseudo: 0.3
  coco: 0.1
  crowdpose: 0.1

epochs: 15
batch_size: 64
num_workers: 6
optimizer:
  name: adamw
  lr: 5.0e-5
  weight_decay: 1.0e-4
scheduler:
  name: cosine
  warmup_epochs: 1
  min_lr: 1.0e-6

loss:
  name: joint_mse_with_visibility
  use_target_weight: true
  pseudo_label_downweight: 0.5   # trust pseudo-labels less than gold

init_from: data/processed/stage_B/best.pt
